# starship.toml
# Layout: left = folder, git | right = battery, time

format = """
$directory\
$git_branch\
$git_status\
$fill\
$battery\
$time\
$line_break\
$character"""

# ── Directory ────────────────────────────────────────────────────────────────
[directory]
style = "bold cyan"
truncation_length = 3
truncate_to_repo = true
format = "[ $path ]($style)"

# ── Git ──────────────────────────────────────────────────────────────────────
[git_branch]
symbol = " "
style = "bold purple"
format = "[ $symbol$branch ]($style)"

[git_status]
style = "bold yellow"
format = "[$all_status$ahead_behind ]($style)"
conflicted = "⚡"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "📦"
modified = "!${count}"
staged = "+${count}"
deleted = "✘${count}"

# ── Fill (pushes right side to the edge) ────────────────────────────────────
[fill]
symbol = " "

# ── Battery ──────────────────────────────────────────────────────────────────
[battery]
full_symbol = "󰁹 "
charging_symbol = "󰂄 "
discharging_symbol = "󰂃 "
format = "[$symbol$percentage ]($style)"

[[battery.display]]
threshold = 20
style = "bold red"

[[battery.display]]
threshold = 50
style = "bold yellow"

[[battery.display]]
threshold = 100
style = "bold green"

# ── Time ─────────────────────────────────────────────────────────────────────
[time]
disabled = false
style = "bold white"
format = "[ 󰥔 $time ]($style)"
time_format = "%H:%M"

# ── Prompt character ─────────────────────────────────────────────────────────
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"